<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>18 Weeks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --card2: #1a1a26;
  --border: rgba(255,255,255,0.07);
  --text: #f0eee8;
  --text2: #8a8799;
  --text3: #4a4860;
  --recovery: #7eb8a4;
  --base:     #e8a44a;
  --build:    #e05a2b;
  --taper:    #7b9fd4;
  --easy:     #5a9e7a;
  --long:     #c45f3a;
  --quality:  #d4a843;
  --strength: #7b8fd4;
  --race:     #e03060;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  user-select: none;
}

.bg-glow {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.07;
  pointer-events: none;
  transition: background 0.6s ease;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  z-index: 0;
}

.shell {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  padding: 16px;
}

.progress-track {
  width: 100%;
  max-width: 420px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-bottom: 16px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s;
}

.deck {
  position: relative;
  width: 100%;
  max-width: 420px;
  height: calc(100vh - 140px);
  max-height: 700px;
}

.card {
  position: absolute;
  inset: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 22px 20px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transform: translateX(60px) scale(0.96);
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1),
              opacity 0.38s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}

.card.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0) scale(1);
}

.card.exit-left  { opacity: 0; pointer-events: none; transform: translateX(-80px) scale(0.94); }
.card.exit-right { opacity: 0; pointer-events: none; transform: translateX(80px) scale(0.94); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}

.week-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  line-height: 1;
  letter-spacing: 0.01em;
  color: var(--text);
  opacity: 0.15;
  position: absolute;
  right: 18px;
  top: 14px;
}

.phase-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}

.tag-recovery { background: rgba(126,184,164,0.15); color: var(--recovery); }
.tag-base     { background: rgba(232,164,74,0.15);  color: var(--base); }
.tag-build    { background: rgba(224,90,43,0.15);   color: var(--build); }
.tag-taper    { background: rgba(123,159,212,0.15); color: var(--taper); }

.special-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

.tag-cutback { background: rgba(123,143,212,0.15); color: var(--strength); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
.tag-peak    { background: rgba(224,90,43,0.2);    color: var(--build);    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
.tag-race-wk { background: rgba(224,48,96,0.2);    color: var(--race);     font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }

.volume-section { margin-bottom: 16px; }

.volume-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}

.volume-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  line-height: 1;
  letter-spacing: 0.02em;
}

.volume-unit  { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); letter-spacing: 0.06em; }
.volume-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; align-self: center; }

.vol-bar-track { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.vol-bar-fill  { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

.sessions-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.sessions-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex: 1;
  overflow: hidden;
}

.session-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}

.session-row:active { transform: scale(0.98); }

.session-row:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.14);
}

.session-row.highlight-long    { border-color: rgba(196,95,58,0.35);  background: rgba(196,95,58,0.07); }
.session-row.highlight-quality { border-color: rgba(212,168,67,0.35); background: rgba(212,168,67,0.06); }
.session-row.highlight-race    { border-color: rgba(224,48,96,0.4);   background: rgba(224,48,96,0.08); }

.session-row.highlight-long:hover    { background: rgba(196,95,58,0.14); }
.session-row.highlight-quality:hover { background: rgba(212,168,67,0.12); }
.session-row.highlight-race:hover    { background: rgba(224,48,96,0.15); }

.session-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
.session-info { flex: 1; min-width: 0; }

.session-day {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1px;
}

.session-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-dist { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; flex-shrink: 0; }

.tap-hint {
  font-size: 9px;
  color: var(--text3);
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
  opacity: 0.7;
}

.effort-dots { display: flex; gap: 3px; flex-shrink: 0; }
.effort-dot  { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.1); }
.effort-dot.filled { background: currentColor; }

.week-note {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 420px;
  margin-top: 14px;
}

.nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.nav-btn:hover    { background: var(--card2); color: var(--text); border-color: rgba(255,255,255,0.15); }
.nav-btn:active   { transform: scale(0.93); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }

.nav-counter { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); letter-spacing: 0.08em; }
.nav-counter strong { color: var(--text2); }

.swipe-hint {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  white-space: nowrap;
  opacity: 0;
  animation: fadeHint 3s ease 1s forwards;
}

@keyframes fadeHint {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── SESSION DETAIL DRAWER ── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  z-index: 200;
  pointer-events: none;
  transition: background 0.3s ease;
}

.drawer-overlay.open {
  background: rgba(0,0,0,0.65);
  pointer-events: all;
}

.drawer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 460px;
  background: #16161f;
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 0 0 32px;
  z-index: 201;
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height: 85vh;
  overflow-y: auto;
}

.drawer.open {
  transform: translateX(-50%) translateY(0);
}

.drawer-handle {
  width: 36px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  margin: 14px auto 20px;
}

.drawer-header {
  padding: 0 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.drawer-icon {
  font-size: 28px;
  flex-shrink: 0;
  margin-top: 2px;
}

.drawer-title-block { flex: 1; }

.drawer-day {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.drawer-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.02em;
  line-height: 1.1;
  color: var(--text);
}

.drawer-dist {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  margin-top: 6px;
  font-weight: 500;
}

.drawer-body { padding: 18px 22px 0; }

.drawer-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.drawer-detail {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.65;
}

.drawer-steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}

.drawer-step {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.drawer-step-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 1px;
  width: 20px;
  text-align: center;
}

.drawer-step-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.55;
}

.drawer-purpose {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border-left: 2px solid;
  font-size: 12px;
  color: var(--text2);
  font-style: italic;
  line-height: 1.5;
}

.drawer-effort-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}

.drawer-effort-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  min-width: 50px;
}

.drawer-effort-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.drawer-effort-fill {
  height: 100%;
  border-radius: 3px;
}

.drawer-effort-val {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  min-width: 32px;
  text-align: right;
}
</style>
</head>
<body>

<div class="bg-glow" id="bg-glow"></div>

<div class="shell">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="deck" id="deck"></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">←</button>
    <div class="nav-counter"><strong id="counter-cur">1</strong> / <span id="counter-tot">18</span></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">→</button>
  </div>
</div>

<!-- Session detail drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-icon" id="d-icon"></div>
    <div class="drawer-title-block">
      <div class="drawer-day" id="d-day"></div>
      <div class="drawer-title" id="d-title"></div>
      <div class="drawer-dist" id="d-dist"></div>
    </div>
  </div>
  <div class="drawer-body">
    <div class="drawer-effort-row">
      <div class="drawer-effort-label">Effort</div>
      <div class="drawer-effort-bar"><div class="drawer-effort-fill" id="d-effort-fill"></div></div>
      <div class="drawer-effort-val" id="d-effort-val"></div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <div class="drawer-section-label">Session Detail</div>
    <div id="d-detail"></div>
    <div class="drawer-purpose" id="d-purpose"></div>
  </div>
</div>

// ── CONFIG ───────────────────────────────
const PEAK_VOLUME = 65;
const PHASE_COLORS = { recovery: '#7eb8a4', base: '#e8a44a', build: '#e05a2b', taper: '#7b9fd4' };
const TYPE_ICONS   = { run: '🏃', long: '🏔', quality: '⚡', strength: '💪', race: '🏁' };
const TYPE_COLORS  = { run: '#5a9e7a', long: '#c45f3a', quality: '#d4a843', strength: '#7b8fd4', race: '#e03060' };
const EFFORT_LEVELS = { run: 2, long: 3, quality: 4, strength: 2, race: 5 };
const EFFORT_LABELS = { 1:'Very easy', 2:'Easy', 3:'Moderate', 4:'Hard', 5:'Race effort' };

let current = 0;
let isAnimating = false;

// ── BUILD CARD ───────────────────────────
function buildCard(w) {
  const phaseColor = PHASE_COLORS[w.phase] || '#888';
  const volPct = Math.min(100, Math.round((w.volume / PEAK_VOLUME) * 100));
  let tags = `<span class="phase-tag tag-${w.phase}">${w.phase}</span>`;
  let specialTags = '';
  if (w.cutback)  specialTags += `<span class="tag-cutback">Cutback</span>`;
  if (w.peak)     specialTags += `<span class="tag-peak">Peak Week</span>`;
  if (w.raceWeek) specialTags += `<span class="tag-race-wk">Race Week</span>`;

  const sessionRows = w.sessions.map((s, si) => {
    const icon  = TYPE_ICONS[s.type]   || '📋';
    const col   = TYPE_COLORS[s.type]  || '#888';
    const effort = EFFORT_LEVELS[s.type] || 1;
    const dots  = Array.from({length:5}, (_,i) =>
      `<div class="effort-dot ${i < effort ? 'filled' : ''}" style="color:${col}"></div>`
    ).join('');
    let rowClass = 'session-row';
    if (s.type === 'long')    rowClass += ' highlight-long';
    if (s.type === 'quality') rowClass += ' highlight-quality';
    if (s.type === 'race')    rowClass += ' highlight-race';
    const distEl = s.distance ? `<span class="session-dist" style="color:${col}">${s.distance}</span>` : '';

    return `<div class="${rowClass}" onclick="openDrawer(${w.week-1}, ${si}, event)">
      <div class="session-icon">${icon}</div>
      <div class="session-info">
        <div class="session-day">${s.day}</div>
        <div class="session-title">${s.title}</div>
      </div>
      ${distEl}
      <div class="effort-dots">${dots}</div>
    </div>`;
  }).join('');

  const noteHtml = w.note ? `<div class="week-note">${w.note}</div>` : '';

  return `
    <div class="card-top">
      <div>
        <div style="margin-bottom:2px">${tags}</div>
        ${specialTags ? `<div class="special-tags">${specialTags}</div>` : ''}
      </div>
    </div>
    <div class="week-num">W${w.week}</div>
    <div class="volume-section">
      <div class="volume-row">
        <span class="volume-num" style="color:${phaseColor}">${w.volume}</span>
        <span class="volume-unit">km</span>
        <span class="volume-label">${volPct}% of peak</span>
      </div>
      <div class="vol-bar-track">
        <div class="vol-bar-fill" style="width:${volPct}%;background:${phaseColor}"></div>
      </div>
    </div>
    <hr class="divider">
    <div class="sessions-label">Sessions — tap for detail</div>
    <div class="sessions-list">${sessionRows}</div>
    ${noteHtml}
  `;
}

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  WEEKS.forEach((w, i) => {
    const el = document.createElement('div');
    el.className = 'card' + (i === current ? ' active' : '');
    el.id = `card-${i}`;
    el.innerHTML = buildCard(w);
    deck.appendChild(el);
  });
  if (current === 0) {
    const hint = document.createElement('div');
    hint.className = 'swipe-hint';
    hint.textContent = '← swipe or use arrows →';
    deck.appendChild(hint);
  }
  updateUI();
}

function updateUI() {
  const w = WEEKS[current];
  const phaseColor = PHASE_COLORS[w.phase] || '#888';
  const pct = Math.round(((current + 1) / WEEKS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = phaseColor;
  document.getElementById('bg-glow').style.background = phaseColor;
  document.getElementById('counter-cur').textContent = current + 1;
  document.getElementById('counter-tot').textContent = WEEKS.length;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === WEEKS.length - 1;
}

function navigate(dir) {
  if (isAnimating) return;
  const next = current + dir;
  if (next < 0 || next >= WEEKS.length) return;
  isAnimating = true;
  const currentCard = document.getElementById(`card-${current}`);
  const nextCard    = document.getElementById(`card-${next}`);
  nextCard.style.transition = 'none';
  nextCard.style.transform  = dir > 0 ? 'translateX(80px) scale(0.96)' : 'translateX(-80px) scale(0.96)';
  nextCard.style.opacity    = '0';
  nextCard.classList.remove('active');
  nextCard.getBoundingClientRect();
  currentCard.style.transition = '';
  currentCard.classList.remove('active');
  currentCard.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
  nextCard.style.transition = '';
  nextCard.style.transform  = '';
  nextCard.style.opacity    = '';
  nextCard.classList.add('active');
  current = next;
  updateUI();
  setTimeout(() => {
    currentCard.classList.remove('exit-left', 'exit-right');
    isAnimating = false;
  }, 400);
}

// ── DRAWER ───────────────────────────────
function openDrawer(weekIdx, sessionIdx, e) {
  e.stopPropagation();
  const w = WEEKS[weekIdx];
  const s = w.sessions[sessionIdx];
  const col    = TYPE_COLORS[s.type]   || '#888';
  const icon   = TYPE_ICONS[s.type]    || '📋';
  const effort = EFFORT_LEVELS[s.type] || 1;

  document.getElementById('d-icon').textContent  = icon;
  document.getElementById('d-day').textContent   = s.day;
  document.getElementById('d-day').style.color   = col;
  document.getElementById('d-title').textContent = s.title;
  document.getElementById('d-title').style.color = col;

  const distEl = document.getElementById('d-dist');
  if (s.distance) {
    distEl.textContent   = s.distance;
    distEl.style.color   = col;
    distEl.style.display = 'block';
  } else {
    distEl.style.display = 'none';
  }

  // Effort bar
  document.getElementById('d-effort-fill').style.width      = (effort / 5 * 100) + '%';
  document.getElementById('d-effort-fill').style.background = col;
  document.getElementById('d-effort-val').textContent       = EFFORT_LABELS[effort] || '';
  document.getElementById('d-effort-val').style.color       = col;

  // Detail
  const detailEl = document.getElementById('d-detail');
  if (Array.isArray(s.detail)) {
    detailEl.innerHTML = `<div class="drawer-steps">${s.detail.map((step, i) =>
      `<div class="drawer-step">
        <div class="drawer-step-num" style="color:${col}">${i+1}</div>
        <div class="drawer-step-text">${step}</div>
      </div>`
    ).join('')}</div>`;
  } else {
    detailEl.innerHTML = `<div class="drawer-detail">${s.detail || ''}</div>`;
  }

  // Purpose
  const purposeEl = document.getElementById('d-purpose');
  if (s.purpose) {
    purposeEl.textContent     = s.purpose;
    purposeEl.style.borderColor = col;
    purposeEl.style.display   = 'block';
  } else {
    purposeEl.style.display   = 'none';
  }

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

// Close drawer on swipe down
let drawerTouchStart = 0;
document.getElementById('drawer').addEventListener('touchstart', e => {
  drawerTouchStart = e.touches[0].clientY;
}, { passive: true });
document.getElementById('drawer').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - drawerTouchStart;
  if (dy > 60) closeDrawer();
}, { passive: true });

// ── KEYBOARD ─────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')      closeDrawer();
  if (e.key === 'ArrowLeft')   navigate(-1);
  if (e.key === 'ArrowRight')  navigate(1);
});

// ── TOUCH SWIPE ──────────────────────────
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (document.getElementById('drawer').classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

// ── INIT ─────────────────────────────────
renderDeck();
</script>
